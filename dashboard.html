<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard do Quiz</title><style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#142033;--muted:#667085;--green:#17a34a;--line:#e6eaf0}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink)}header{background:#0f172a;color:#fff;padding:26px 22px}.wrap{max-width:1180px;margin:auto}.toprow{display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap}h1{margin:0;font-size:28px}.sub{color:#cbd5e1;margin-top:7px}.actions{display:flex;gap:10px;flex-wrap:wrap}button,select{border:1px solid var(--line);background:#fff;border-radius:10px;padding:11px 14px;font:inherit;cursor:pointer}.primary{background:var(--green);color:#fff;border:0}.main{padding:24px 18px 50px}.notice{background:#fff6d8;border:1px solid #f2d777;border-radius:14px;padding:14px 16px;margin-bottom:18px;display:none}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 4px 18px rgba(15,23,42,.04)}.metric{font-size:30px;font-weight:850;margin-top:8px}.label{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}.section{margin-top:22px}.section h2{font-size:21px;margin:0 0 13px}.question{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px}.qhead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}.qtitle{font-weight:800;font-size:17px}.qmeta{color:var(--muted);font-size:13px;white-space:nowrap}.answer{display:grid;grid-template-columns:minmax(170px,2fr) 5fr 80px;gap:12px;align-items:center;margin:11px 0}.answer-name{font-size:14px}.track{height:13px;background:#edf0f4;border-radius:999px;overflow:hidden}.fill{height:100%;background:var(--green);border-radius:999px}.num{text-align:right;font-weight:750}.winner{display:inline-block;background:#eaf8ef;color:#0d7d38;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:800;margin-left:7px}.empty{text-align:center;color:var(--muted);padding:45px 10px}.table{width:100%;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden;border:1px solid var(--line)}.table th,.table td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:left;font-size:14px}.table th{color:var(--muted);background:#fafbfc}.danger{color:#b42318}@media(max-width:800px){.cards{grid-template-columns:1fr 1fr}.answer{grid-template-columns:1fr}.num{text-align:left}.qhead{display:block}.qmeta{margin-top:6px}}@media(max-width:460px){.cards{grid-template-columns:1fr}}
</style></head><body><header><div class="wrap toprow"><div><h1>Dashboard do Quiz</h1><div class="sub">Cliques, respostas mais escolhidas e abandono em todas as etapas.</div></div><div class="actions"><select id="period"><option value="1">Hoje</option><option value="7" selected>Últimos 7 dias</option><option value="30">Últimos 30 dias</option><option value="3650">Todo o período</option></select><button id="refresh" class="primary">Atualizar</button></div></div></header><main class="main wrap"><div id="notice" class="notice"></div><div class="cards"><div class="card"><div class="label">Visitantes</div><div id="visitors" class="metric">0</div></div><div class="card"><div class="label">Iniciaram</div><div id="started" class="metric">0</div></div><div class="card"><div class="label">Chegaram ao final</div><div id="finished" class="metric">0</div></div><div class="card"><div class="label">Conversão até o final</div><div id="conversion" class="metric">0%</div></div></div><section class="section"><h2>Respostas de todas as perguntas</h2><div id="questions"><div class="empty">Carregando dados...</div></div></section><section class="section"><h2>Funil e abandono por etapa</h2><div id="funnel"></div></section></main><script>
const SUPABASE_URL="https://vcmgzggyktlbgyjxicks.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_xXgcXLH1vi5RJpZBXJ3KfQ_tFxwWiR7";
const stepOrder=['welcome','commitment','gender','age','objective','situation','motivation','feeling','income','obstacle','dream','goal','time','final'];
const stepNames={welcome:'Página inicial',commitment:'Compromisso',gender:'Gênero',age:'Idade',objective:'Objetivo principal',situation:'Situação atual',motivation:'Motivação',feeling:'Sentimento atual',income:'Satisfação com renda',obstacle:'Maior obstáculo',dream:'Sonho',goal:'Meta diária',time:'Tempo disponível',final:'Página final'};
const notice=document.getElementById('notice');
function configured(){return SUPABASE_URL.startsWith('https://')&&!SUPABASE_URL.includes('COLE_')&&SUPABASE_ANON_KEY&&!SUPABASE_ANON_KEY.includes('COLE_')}
function uniq(arr){return new Set(arr).size}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
async function load(){
 if(!configured()){notice.style.display='block';notice.innerHTML='<b>Configuração pendente:</b> cole a URL e a chave ANON do Supabase no início deste arquivo e também no HTML do quiz.';document.getElementById('questions').innerHTML='<div class="empty">Configure o banco para começar a receber os cliques de todos os visitantes.</div>';return}
 notice.style.display='none';document.getElementById('questions').innerHTML='<div class="empty">Carregando dados...</div>';
 const days=Number(document.getElementById('period').value);const since=new Date(Date.now()-days*86400000).toISOString();
 const url=`${SUPABASE_URL}/rest/v1/quiz_events?select=*&created_at=gte.${encodeURIComponent(since)}&order=created_at.asc&limit=50000`;
 const res=await fetch(url,{headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${SUPABASE_ANON_KEY}`}});if(!res.ok){throw new Error(await res.text())}const rows=await res.json();render(rows)
}
function render(rows){
 const visitors=uniq(rows.map(r=>r.visitor_id).filter(Boolean));const started=uniq(rows.filter(r=>r.event_name==='start_now_click').map(r=>r.visitor_id));const finished=uniq(rows.filter(r=>r.event_name==='step_view'&&r.step_id==='final').map(r=>r.visitor_id));
 document.getElementById('visitors').textContent=visitors;document.getElementById('started').textContent=started;document.getElementById('finished').textContent=finished;document.getElementById('conversion').textContent=(started?Math.round(finished/started*100):0)+'%';
 const answers=rows.filter(r=>r.event_name==='answer_click');const groups={};for(const r of answers){const key=r.step_id||'unknown';groups[key]??={question:r.question||stepNames[key]||key,answers:{},people:new Set()};const a=r.answer_label||r.answer_value||'Sem nome';groups[key].answers[a]=(groups[key].answers[a]||0)+1;groups[key].people.add(r.visitor_id)}
 const ordered=Object.entries(groups).sort((a,b)=>stepOrder.indexOf(a[0])-stepOrder.indexOf(b[0]));
 document.getElementById('questions').innerHTML=ordered.length?ordered.map(([id,g])=>{const total=Object.values(g.answers).reduce((a,b)=>a+b,0);const max=Math.max(...Object.values(g.answers));const items=Object.entries(g.answers).sort((a,b)=>b[1]-a[1]).map(([name,count])=>`<div class="answer"><div class="answer-name">${esc(name)}${count===max?'<span class="winner">MAIS CLICADA</span>':''}</div><div class="track"><div class="fill" style="width:${total?count/total*100:0}%"></div></div><div class="num">${count} · ${total?Math.round(count/total*100):0}%</div></div>`).join('');return `<article class="question"><div class="qhead"><div class="qtitle">${esc(stepNames[id]||g.question)}</div><div class="qmeta">${g.people.size} pessoas · ${total} cliques</div></div>${items}</article>`}).join(''):'<div class="empty">Ainda não existem respostas neste período.</div>';
 const views={};for(const r of rows.filter(r=>r.event_name==='step_view')){views[r.step_id]??=new Set();views[r.step_id].add(r.visitor_id)}const data=stepOrder.map((id,i)=>{const count=views[id]?.size||0;const prev=i?views[stepOrder[i-1]]?.size||0:count;const drop=i&&prev?Math.max(0,Math.round((prev-count)/prev*100)):0;return `<tr><td>${i+1}</td><td>${esc(stepNames[id])}</td><td>${count}</td><td class="${drop>=30?'danger':''}">${i?drop+'%':'—'}</td></tr>`}).join('');document.getElementById('funnel').innerHTML=`<table class="table"><thead><tr><th>Etapa</th><th>Página</th><th>Pessoas que visualizaram</th><th>Abandono</th></tr></thead><tbody>${data}</tbody></table>`
}
document.getElementById('refresh').onclick=()=>load().catch(e=>{notice.style.display='block';notice.textContent='Erro ao carregar: '+e.message});document.getElementById('period').onchange=()=>document.getElementById('refresh').click();load().catch(e=>{notice.style.display='block';notice.textContent='Erro ao carregar: '+e.message});
</script></body></html>
